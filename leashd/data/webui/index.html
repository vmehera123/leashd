<!DOCTYPE html>
<html lang="en" data-theme="auto" data-color-theme="cool-midnight">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>leashd</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#22d3ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/style.css">
  <link id="hljs-theme-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
  <link id="hljs-theme-light" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" disabled>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐕</text></svg>">
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <h1>leashd</h1>
      <p class="auth-subtitle">Remote AI-assisted development</p>
      <form id="auth-form" autocomplete="off">
        <label for="api-key-input" class="sr-only">API key</label>
        <input
          type="password"
          id="api-key-input"
          placeholder="API key"
          autocomplete="current-password"
          aria-label="API key"
          required
        >
        <button type="submit" id="auth-btn">Connect</button>
      </form>
      <p id="auth-error" class="error-text" hidden></p>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen" hidden>
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="sidebar-logo-emoji">🐕</span>
          <span>leashd</span>
        </div>
        <button class="sidebar-close" title="Close sidebar" aria-label="Close sidebar">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
        </button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
      <div class="sidebar-footer" id="sidebar-working-dir"></div>
    </nav>
    <div id="sidebar-overlay"></div>

    <!-- Chat Main -->
    <div id="chat-main">
      <!-- Header -->
      <header id="header">
        <div class="header-left">
          <button id="sidebar-toggle" class="hamburger-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
          </button>
          <span class="header-title">leashd</span>
          <span id="connection-dot" class="dot dot-disconnected" title="Disconnected"></span>
        </div>
        <div class="header-right">
          <button id="theme-toggle-btn" class="icon-btn" data-tooltip="Theme" aria-label="Toggle theme">
            <svg id="theme-icon-auto" class="theme-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 2a6 6 0 0 1 0 12V2z" fill="currentColor"/></svg>
            <svg id="theme-icon-dark" class="theme-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" hidden><path d="M6 1a7 7 0 1 0 8.4 8.4A5.5 5.5 0 0 1 6 1z"/></svg>
            <svg id="theme-icon-light" class="theme-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" hidden><circle cx="8" cy="8" r="3"/><path d="M8 0v2m0 12v2M0 8h2m12 0h2m-2.9-5.1-1.4 1.4M4.3 11.7l-1.4 1.4m0-10.2 1.4 1.4m7.4 7.4 1.4 1.4"/></svg>
          </button>
          <button id="settings-btn" class="icon-btn" data-tooltip="Settings" aria-label="Settings">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.34 1.804A1 1 0 0 1 9.32 1h1.36a1 1 0 0 1 .98.804l.295 1.473c.497.144.971.342 1.416.587l1.25-.834a1 1 0 0 1 1.262.125l.962.962a1 1 0 0 1 .125 1.262l-.834 1.25c.245.445.443.919.587 1.416l1.473.294a1 1 0 0 1 .804.98v1.361a1 1 0 0 1-.804.98l-1.473.295a6.95 6.95 0 0 1-.587 1.416l.834 1.25a1 1 0 0 1-.125 1.262l-.962.962a1 1 0 0 1-1.262.125l-1.25-.834a6.953 6.953 0 0 1-1.416.587l-.294 1.473a1 1 0 0 1-.98.804H9.32a1 1 0 0 1-.98-.804l-.295-1.473a6.957 6.957 0 0 1-1.416-.587l-1.25.834a1 1 0 0 1-1.262-.125l-.962-.962a1 1 0 0 1-.125-1.262l.834-1.25a6.957 6.957 0 0 1-.587-1.416l-1.473-.294A1 1 0 0 1 1 11.361V10a1 1 0 0 1 .804-.98l1.473-.295c.144-.497.342-.971.587-1.416l-.834-1.25a1 1 0 0 1 .125-1.262l.962-.962A1 1 0 0 1 5.38 3.71l1.25.834a6.957 6.957 0 0 1 1.416-.587l.294-1.453ZM13 10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" clip-rule="evenodd"/></svg>
          </button>

        </div>
      </header>

      <!-- Empty State -->
      <div id="empty-state">
        <div class="empty-emoji">🐕</div>
        <div class="empty-title">leashd</div>
        <div class="empty-subtitle">Send a message to get started</div>
      </div>

      <!-- Messages Area -->
      <main id="messages" role="log" aria-live="polite"></main>

      <!-- Input Area -->
      <footer id="input-area">
        <div id="queued-banner" class="queued-banner" hidden></div>
        <div id="attachment-preview" hidden></div>
        <div class="input-pill">
          <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp,application/pdf" multiple hidden aria-label="Upload files">
          <button id="upload-btn" title="Attach file" aria-label="Attach file" class="icon-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 3a2.5 2.5 0 0 1 5 0v9a1.5 1.5 0 0 1-3 0V5a.5.5 0 0 1 1 0v7a.5.5 0 0 0 1 0V3a1.5 1.5 0 1 0-3 0v9a2.5 2.5 0 0 0 5 0V5a.5.5 0 0 1 1 0v7a3.5 3.5 0 1 1-7 0V3z"/></svg>
          </button>
          <textarea
            id="message-input"
            placeholder="Send a message or /command..."
            rows="1"
            autocomplete="off"
            aria-label="Message input"
          ></textarea>
          <button id="send-btn" title="Send" aria-label="Send message" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.036a.5.5 0 0 1 .54.11zM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493z"/></svg>
          </button>
        </div>
      </footer>
    </div>
  </div>

  <!-- Settings Screen -->
  <div id="settings-screen" class="screen" hidden>
    <header id="settings-header">
      <button id="settings-back-btn" class="icon-btn" title="Back" aria-label="Back to chat">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
      </button>
      <span class="settings-title">Settings</span>
    </header>
    <main class="settings-body" id="settings-body"></main>
    <div class="save-bar" id="save-bar" hidden>
      <button id="save-btn" class="btn-primary save-btn">Save Changes</button>
    </div>
  </div>

  <!-- Modal Overlay (questions, plan reviews) -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" hidden>
    <div id="modal-content" class="modal-card"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
